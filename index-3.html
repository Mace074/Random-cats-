<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just a Cat 🐱</title>
<meta name="description" content="A different cat every time. With memes. And lights.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:    #f7f4ef;
  --paper:    #edeae3;
  --coral:    #e8603a;
  --coral-dk: #c94d2a;
  --ink:      #1e1c18;
  --ink2:     #5a5650;
  --white:    #ffffff;
  --gold:     #f7c948;
}

html, body {
  height: 100%;
  background: var(--cream);
  color: var(--ink);
  font-family: 'DM Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 16px 40px;
  gap: 0;
}

/* ══════════════════════════════════════
   FAIRY LIGHTS
══════════════════════════════════════ */
.lights-bar {
  width: 100%;
  position: relative;
  height: 52px;
  margin-bottom: 8px;
  overflow: visible;
  flex-shrink: 0;
}

.lights-bar svg {
  width: 100%;
  height: 52px;
  overflow: visible;
}

/* Wire */
.wire { stroke: #5a4a3a; stroke-width: 1.5; fill: none; }

/* Bulb glow animation */
.bulb { cursor: default; }
.bulb circle.glow {
  filter: blur(3px);
  animation: flicker var(--dur, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
.bulb circle.base {
  animation: flicker var(--dur, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}

@keyframes flicker {
  0%,100% { opacity: 1; }
  15%      { opacity: .85; }
  30%      { opacity: 1; }
  50%      { opacity: .7; }
  65%      { opacity: 1; }
  80%      { opacity: .9; }
}

/* ══════════════════════════════════════
   CAT COUNTER BADGE
══════════════════════════════════════ */
.counter-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--ink);
  color: var(--gold);
  border-radius: 999px;
  padding: 7px 18px 7px 14px;
  margin-bottom: 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: 0.3px;
  box-shadow: 0 2px 12px rgba(0,0,0,.18);
  user-select: none;
  transition: transform 0.15s;
}

.counter-badge .paw { font-size: 1.1rem; }

.counter-number {
  font-family: 'Playfair Display', serif;
  font-size: 1.45rem;
  font-style: italic;
  font-weight: 700;
  color: var(--gold);
  min-width: 2ch;
  text-align: center;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
}

.counter-number.bump {
  transform: scale(1.35);
}

.counter-label {
  opacity: 0.7;
  font-size: 0.78rem;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.site-header {
  text-align: center;
  margin-bottom: 22px;
}

.site-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 400;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--ink);
}

.site-title em { font-style: italic; color: var(--coral); }

.site-sub {
  margin-top: 7px;
  font-size: clamp(0.78rem, 2.5vw, 0.88rem);
  font-weight: 300;
  color: var(--ink2);
  letter-spacing: 0.2px;
}

/* ══════════════════════════════════════
   POLAROID
══════════════════════════════════════ */
.polaroid {
  background: var(--white);
  padding: 14px 14px 60px;
  box-shadow:
    0 2px 4px rgba(0,0,0,.06),
    0 8px 24px rgba(0,0,0,.10),
    0 24px 60px rgba(0,0,0,.08);
  border-radius: 3px;
  width: min(480px, 100%);
  transform-origin: center bottom;
  animation: develop 0.6s cubic-bezier(0.2,0.8,0.2,1) both;
  position: relative;
}

@keyframes develop {
  from { opacity: 0; transform: scale(0.93) translateY(12px) rotate(-1deg); }
  to   { opacity: 1; transform: scale(1) translateY(0) rotate(-0.5deg); }
}

.polaroid.loading { animation: none; opacity: 1; transform: rotate(-0.5deg); }

.photo-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--paper);
  overflow: hidden;
  border-radius: 1px;
}

.cat-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.4s ease;
}

.cat-img.fade-out { opacity: 0; }
.cat-img.fade-in  { opacity: 1; }

/* Skeleton shimmer */
.skeleton {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--paper) 25%, #e2dfd7 50%, var(--paper) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  pointer-events: none;
  transition: opacity 0.3s;
}
.skeleton.hidden { opacity: 0; pointer-events: none; }

@keyframes shimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* Meme tag overlay */
.meme-tag {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--gold);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.3s 0.4s;
  pointer-events: none;
}
.meme-tag.visible { opacity: 1; }

/* Polaroid caption */
.polaroid-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  gap: 8px;
}

.caption-left {
  font-family: 'Playfair Display', Georgia, serif;
  font-style: italic;
  font-size: 0.8rem;
  color: var(--ink2);
  opacity: 0;
  transition: opacity 0.35s;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.caption-left.visible { opacity: 0.75; }

.caption-right {
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--ink2);
  opacity: 0;
  transition: opacity 0.35s;
  white-space: nowrap;
}
.caption-right.visible { opacity: 0.5; }

/* ══════════════════════════════════════
   MEME CAPTIONS (big text overlay on image)
══════════════════════════════════════ */
.meme-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 12px;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 55%);
  opacity: 0;
  transition: opacity 0.4s 0.3s;
}
.meme-overlay.visible { opacity: 1; }

.meme-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: clamp(0.9rem, 4vw, 1.15rem);
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,.7), 0 0 12px rgba(0,0,0,.4);
  letter-spacing: 0.2px;
  line-height: 1.3;
}

/* ══════════════════════════════════════
   CONTROLS
══════════════════════════════════════ */
.controls {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 11px;
  width: min(480px, 100%);
}

.btn-new {
  width: 100%;
  padding: 15px 24px;
  background: var(--coral);
  color: white;
  border: none;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 0.1px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 2px 8px rgba(232,96,58,.35);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  overflow: hidden;
}
.btn-new:hover  { background: var(--coral-dk); box-shadow: 0 4px 16px rgba(232,96,58,.4); }
.btn-new:active { transform: scale(0.97); }
.btn-new:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.btn-new .spin { display: inline-block; animation: spin 0.8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.btn-row {
  display: flex;
  gap: 10px;
  width: 100%;
}

.btn-save, .btn-sound {
  flex: 1;
  background: none;
  border: 1.5px solid var(--paper);
  border-radius: 4px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 400;
  color: var(--ink2);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-save:hover, .btn-sound:hover {
  border-color: var(--ink2);
  color: var(--ink);
  background: var(--paper);
}

.btn-sound.muted { opacity: 0.5; }

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.site-footer {
  margin-top: 26px;
  font-size: 0.72rem;
  color: var(--ink2);
  opacity: 0.5;
  text-align: center;
  letter-spacing: 0.3px;
}

/* ══════════════════════════════════════
   CONFETTI BURST
══════════════════════════════════════ */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  animation: confetti-fall 1.2s ease-in forwards;
}

@keyframes confetti-fall {
  0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(60vh) rotate(720deg) scale(0.5); opacity: 0; }
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 400px) {
  body { padding: 0 12px 28px; }
  .site-header { margin-bottom: 16px; }
  .polaroid { padding: 10px 10px 52px; }
  .controls { margin-top: 14px; gap: 9px; }
  .btn-new { padding: 14px 20px; }
}

@media (prefers-reduced-motion: reduce) {
  .polaroid { animation: none; opacity: 1; transform: rotate(-0.5deg); }
  .skeleton { animation: none; }
  .cat-img  { transition: none; }
  .bulb circle { animation: none !important; }
}
</style>
</head>
<body>

<!-- ── Fairy Lights ── -->
<div class="lights-bar" id="lightsBar">
  <svg id="lightsSvg" preserveAspectRatio="none"></svg>
</div>

<!-- ── Cat counter badge ── -->
<div class="counter-badge" id="counterBadge">
  <span class="paw">🐾</span>
  <span class="counter-number" id="counterNum">0</span>
  <span class="counter-label">cats seen</span>
</div>

<!-- ── Header ── -->
<header class="site-header">
  <h1 class="site-title">Just <em>a cat</em></h1>
  <p class="site-sub">A different one every time. With memes.</p>
</header>

<!-- ── Polaroid ── -->
<div class="polaroid" id="polaroid">
  <div class="photo-frame">
    <img class="cat-img" id="catImg" src="" alt="A random cat" draggable="false">
    <div class="skeleton" id="skeleton"></div>
    <!-- meme caption overlay (shown on meme cats) -->
    <div class="meme-overlay" id="memeOverlay">
      <div class="meme-text" id="memeText"></div>
    </div>
    <!-- "MEME" badge tag -->
    <div class="meme-tag" id="memeTag">✨ meme</div>
  </div>
  <div class="polaroid-caption">
    <span class="caption-left" id="captionLeft"></span>
    <span class="caption-right" id="captionRight"></span>
  </div>
</div>

<!-- ── Controls ── -->
<div class="controls">
  <button class="btn-new" id="btnNew" onclick="newCat()">
    <span id="btnIcon">🐾</span>
    <span id="btnLabel">Another cat</span>
  </button>
  <div class="btn-row">
    <button class="btn-save" onclick="saveCat()">⬇ Save this cat</button>
    <button class="btn-sound" id="btnSound" onclick="toggleSound()">🔊 Sound on</button>
  </div>
</div>

<footer class="site-footer">
  Photos via <a href="https://cataas.com" target="_blank" rel="noopener" style="color:inherit">cataas.com</a> · a different cat every time
</footer>

<!-- Confetti container -->
<div class="confetti-wrap" id="confettiWrap"></div>

<script>
/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
var count = 0;
var currentUrl = '';
var isLoading = false;
var soundEnabled = true;
var audioCtx = null;

/* ════════════════════════════════════════
   FAIRY LIGHTS
════════════════════════════════════════ */
var BULB_COLORS = [
  ['#ff6b6b','#ff0000'], ['#ffd93d','#ffaa00'], ['#6bcb77','#00aa44'],
  ['#4d96ff','#0055ff'], ['#ff6bcc','#ff00aa'], ['#ff9f43','#e67e22'],
  ['#a29bfe','#6c5ce7'], ['#00cec9','#00b894']
];

function buildLights() {
  var svg = document.getElementById('lightsSvg');
  var W = svg.parentElement.offsetWidth || window.innerWidth;
  var H = 52;
  var spacing = 42;
  var numBulbs = Math.floor(W / spacing) + 1;
  var segments = [];
  var bulbGroups = [];

  // Wire path: gentle sine wave
  var pts = [];
  for (var i = 0; i <= numBulbs; i++) {
    var x = i * spacing;
    var y = 8 + Math.sin(i * 0.9) * 5;
    pts.push(x + ',' + y);
  }

  // Wire
  var wire = document.createElementNS('http://www.w3.org/2000/svg','path');
  wire.setAttribute('class','wire');
  wire.setAttribute('d','M ' + pts.join(' L '));
  svg.appendChild(wire);

  // Bulbs
  for (var j = 0; j <= numBulbs; j++) {
    var bx = j * spacing;
    var by = 8 + Math.sin(j * 0.9) * 5;
    var col = BULB_COLORS[j % BULB_COLORS.length];
    var dur = (2.2 + Math.random() * 2.5).toFixed(2) + 's';
    var delay = (Math.random() * 2.5).toFixed(2) + 's';

    var g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','bulb');

    // socket
    var socket = document.createElementNS('http://www.w3.org/2000/svg','rect');
    socket.setAttribute('x', bx - 3);
    socket.setAttribute('y', by);
    socket.setAttribute('width', '6');
    socket.setAttribute('height', '5');
    socket.setAttribute('fill', '#4a3a2a');
    socket.setAttribute('rx', '1');
    g.appendChild(socket);

    // glow halo
    var glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
    glow.setAttribute('class','glow');
    glow.setAttribute('cx', bx);
    glow.setAttribute('cy', by + 13);
    glow.setAttribute('r', '9');
    glow.setAttribute('fill', col[0]);
    glow.setAttribute('opacity','0.45');
    glow.style.setProperty('--dur', dur);
    glow.style.setProperty('--delay', delay);
    g.appendChild(glow);

    // bulb body
    var base = document.createElementNS('http://www.w3.org/2000/svg','circle');
    base.setAttribute('class','base');
    base.setAttribute('cx', bx);
    base.setAttribute('cy', by + 13);
    base.setAttribute('r', '6');
    base.setAttribute('fill', col[0]);
    base.style.setProperty('--dur', dur);
    base.style.setProperty('--delay', delay);
    g.appendChild(base);

    // highlight
    var hi = document.createElementNS('http://www.w3.org/2000/svg','circle');
    hi.setAttribute('cx', bx - 2);
    hi.setAttribute('cy', by + 10);
    hi.setAttribute('r', '2');
    hi.setAttribute('fill', 'rgba(255,255,255,0.55)');
    hi.setAttribute('pointer-events','none');
    g.appendChild(hi);

    svg.appendChild(g);
  }
}

buildLights();
window.addEventListener('resize', function() {
  var svg = document.getElementById('lightsSvg');
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  buildLights();
});

/* ════════════════════════════════════════
   SOUND ENGINE (Web Audio API)
════════════════════════════════════════ */
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playYippee() {
  if (!soundEnabled) return;
  try {
    var ctx = getCtx();
    var t = ctx.currentTime;

    // Quick rising chirp — "yip!"
    var osc1 = ctx.createOscillator();
    var gain1 = ctx.createGain();
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(520, t);
    osc1.frequency.linearRampToValueAtTime(880, t + 0.08);
    osc1.frequency.linearRampToValueAtTime(1100, t + 0.14);
    gain1.gain.setValueAtTime(0, t);
    gain1.gain.linearRampToValueAtTime(0.13, t + 0.03);
    gain1.gain.linearRampToValueAtTime(0, t + 0.18);
    osc1.start(t);
    osc1.stop(t + 0.2);

    // Bouncy "pee!" follow-up
    var osc2 = ctx.createOscillator();
    var gain2 = ctx.createGain();
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(900, t + 0.18);
    osc2.frequency.linearRampToValueAtTime(1300, t + 0.28);
    osc2.frequency.linearRampToValueAtTime(1050, t + 0.38);
    gain2.gain.setValueAtTime(0, t + 0.18);
    gain2.gain.linearRampToValueAtTime(0.10, t + 0.21);
    gain2.gain.linearRampToValueAtTime(0, t + 0.42);
    osc2.start(t + 0.18);
    osc2.stop(t + 0.45);

    // Tiny sparkle tail
    var osc3 = ctx.createOscillator();
    var gain3 = ctx.createGain();
    osc3.connect(gain3);
    gain3.connect(ctx.destination);
    osc3.type = 'triangle';
    osc3.frequency.setValueAtTime(1600, t + 0.38);
    osc3.frequency.linearRampToValueAtTime(2000, t + 0.5);
    gain3.gain.setValueAtTime(0, t + 0.38);
    gain3.gain.linearRampToValueAtTime(0.06, t + 0.41);
    gain3.gain.linearRampToValueAtTime(0, t + 0.54);
    osc3.start(t + 0.38);
    osc3.stop(t + 0.56);
  } catch(e) {}
}

function playPurr() {
  if (!soundEnabled) return;
  try {
    var ctx = getCtx();
    var bufSize = ctx.sampleRate * 0.6;
    var buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    // Low-frequency rumble
    for (var i = 0; i < bufSize; i++) {
      var t = i / ctx.sampleRate;
      data[i] = Math.sin(2 * Math.PI * 25 * t) * 0.3 * (Math.random() * 0.4 + 0.6);
    }
    var src = ctx.createBufferSource();
    src.buffer = buffer;
    var gain = ctx.createGain();
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
    src.start();
  } catch(e) {}
}

function playChime() {
  if (!soundEnabled) return;
  try {
    var ctx = getCtx();
    [523, 659, 784].forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      var t = ctx.currentTime + i * 0.08;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.start(t);
      osc.stop(t + 0.75);
    });
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  var btn = document.getElementById('btnSound');
  btn.textContent = soundEnabled ? '🔊 Sound on' : '🔇 Sound off';
  btn.classList.toggle('muted', !soundEnabled);
  if (soundEnabled) playChime();
}

/* ════════════════════════════════════════
   MEME CAPTIONS
════════════════════════════════════════ */
var MEMES = [

/* Show meme on ~40% of cats */
function shouldShowMeme() { return Math.random() < 0.4; }

/* ════════════════════════════════════════
   CONFETTI
════════════════════════════════════════ */
var CONFETTI_COLORS = ['#e8603a','#f7c948','#6bcb77','#4d96ff','#ff6bcc','#a29bfe'];

function burst(x, y) {
  var wrap = document.getElementById('confettiWrap');
  for (var i = 0; i < 18; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
    el.style.top  = (y + (Math.random() - 0.5) * 20) + 'px';
    el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    el.style.transform = 'rotate(' + (Math.random()*360) + 'deg)';
    el.style.animationDelay = (Math.random()*0.15) + 's';
    wrap.appendChild(el);
    setTimeout(function(e){ e.remove(); }, 1400);
  }
}

/* ════════════════════════════════════════
   CAT URLS
════════════════════════════════════════ */
function getCatUrl() {
  // cataas supports /cat/gif, /cat/says/text, or plain /cat
  var roll = Math.random();
  if (roll < 0.2) {
    // Cataas text meme — the API will overlay text on the cat
    var meme = MEMES[Math.floor(Math.random() * MEMES.length)];
    var encoded = encodeURIComponent(meme);
    return { url: 'https://cataas.com/cat/says/' + encoded + '?t=' + Date.now(), isMeme: true, text: meme };
  } else if (roll < 0.35) {
    return { url: 'https://cataas.com/cat/gif?t=' + Date.now(), isMeme: false, text: '' };
  } else {
    return { url: 'https://cataas.com/cat?t=' + Date.now() + '&r=' + Math.random().toString(36).slice(2), isMeme: false, text: '' };
  }
}

/* ════════════════════════════════════════
   COUNTER UPDATE
════════════════════════════════════════ */
function updateCounter(n) {
  var el = document.getElementById('counterNum');
  el.textContent = n;
  el.classList.remove('bump');
  void el.offsetWidth; // reflow
  el.classList.add('bump');
  setTimeout(function(){ el.classList.remove('bump'); }, 300);

  // Milestone confetti
  if (n === 5 || n === 10 || n % 25 === 0) {
    var badge = document.getElementById('counterBadge');
    var r = badge.getBoundingClientRect();
    burst(r.left + r.width / 2, r.top + r.height / 2);
    playChime();
  }
}

/* ════════════════════════════════════════
   NEW CAT
════════════════════════════════════════ */
function newCat() {
  if (isLoading) return;
  isLoading = true;

  var img       = document.getElementById('catImg');
  var skel      = document.getElementById('skeleton');
  var btnNew    = document.getElementById('btnNew');
  var btnIcon   = document.getElementById('btnIcon');
  var btnLbl    = document.getElementById('btnLabel');
  var capLeft   = document.getElementById('captionLeft');
  var capRight  = document.getElementById('captionRight');
  var memeOvl   = document.getElementById('memeOverlay');
  var memeText  = document.getElementById('memeText');
  var memeTag   = document.getElementById('memeTag');
  var card      = document.getElementById('polaroid');

  // Loading state
  btnNew.disabled = true;
  btnIcon.classList.add('spin');
  btnIcon.textContent = '⟳';
  btnLbl.textContent  = 'Finding a cat…';

  skel.classList.remove('hidden');
  img.classList.add('fade-out');
  capLeft.classList.remove('visible');
  capRight.classList.remove('visible');
  memeOvl.classList.remove('visible');
  memeTag.classList.remove('visible');
  card.classList.add('loading');

  var catData = getCatUrl();
  var url     = catData.url;
  var isMeme  = catData.isMeme;
  var memeStr = catData.text;

  // Also show our overlay meme on plain cats sometimes
  var showOverlayMeme = !isMeme && shouldShowMeme();
  var overlayMemeStr  = showOverlayMeme ? MEMES[Math.floor(Math.random() * MEMES.length)] : '';

  var tempImg = new Image();
  var settled = false;

  function onSuccess(finalUrl) {
    if (settled) return;
    settled = true;

    currentUrl = finalUrl;
    count++;

    img.src = finalUrl;
    img.classList.remove('fade-out');
    img.classList.add('fade-in');
    skel.classList.add('hidden');
    playYippee();

    var tilt = (Math.random() * 2 - 1).toFixed(2);
    card.style.transform = 'rotate(' + tilt + 'deg)';
    card.classList.remove('loading');

    // Counter
    updateCounter(count);

    // Caption
    var phrases = ['precious', 'a good cat', 'quality cat', 'excellent', 'very cat'];
    capLeft.textContent = phrases[Math.floor(Math.random() * phrases.length)];
    capLeft.classList.add('visible');
    capRight.textContent = 'no. ' + count;
    capRight.classList.add('visible');

    // Meme overlay
    if (showOverlayMeme) {
      memeText.textContent = overlayMemeStr;
      memeOvl.classList.add('visible');
      memeTag.textContent = '✨ ' + MEME_LABELS[Math.floor(Math.random() * MEME_LABELS.length)];
      memeTag.classList.add('visible');
    } else if (isMeme) {
      memeTag.textContent = '😂 lolcat';
      memeTag.classList.add('visible');
    }

    btnNew.disabled = false;
    btnIcon.classList.remove('spin');
    btnIcon.textContent = '🐾';
    btnLbl.textContent  = 'Another cat';
    isLoading = false;
  }

  function onError() {
    if (settled) return;
    // Fallback: load via a fresh temp image, never touch img.onload
    fetch('https://api.thecatapi.com/v1/images/search')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        var fbUrl = data[0].url;
        var fbImg = new Image();
        fbImg.onload = function() { fbImg.onload = null; onSuccess(fbUrl); };
        fbImg.onerror = function() {
          fbImg.onerror = null;
          if (settled) return;
          settled = true;
          skel.classList.add('hidden');
          img.classList.remove('fade-out');
          btnNew.disabled = false;
          btnIcon.classList.remove('spin');
          btnIcon.textContent = '🐾';
          btnLbl.textContent  = 'Try again';
          isLoading = false;
        };
        fbImg.src = fbUrl;
      })
      .catch(function() {
        if (settled) return;
        settled = true;
        skel.classList.add('hidden');
        img.classList.remove('fade-out');
        btnNew.disabled = false;
        btnIcon.classList.remove('spin');
        btnIcon.textContent = '🐾';
        btnLbl.textContent  = 'Try again';
        isLoading = false;
      });
  }

  tempImg.onload  = function() { tempImg.onload = null; tempImg.onerror = null; onSuccess(url); };
  tempImg.onerror = function() { tempImg.onload = null; tempImg.onerror = null; onError(); };
  tempImg.src = url;
}

/* ════════════════════════════════════════
   SAVE
════════════════════════════════════════ */
function saveCat() {
  if (!currentUrl) return;
  var a = document.createElement('a');
  a.href = currentUrl;
  a.download = 'cat-' + count + '.jpg';
  a.target = '_blank';
  a.click();
  playPurr();
}

/* ════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  if ((e.code === 'Space' || e.code === 'Enter') && document.activeElement.tagName !== 'BUTTON') {
    e.preventDefault();
    newCat();
  }
});

window.addEventListener('load', newCat);
</script>
